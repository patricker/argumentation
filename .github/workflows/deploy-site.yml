name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout sibling encounter repo
        uses: actions/checkout@v4
        with:
          repository: patricker/encounter
          path: encounter-sibling
          ref: main

      - name: Stage sibling repo for path-dep resolution
        run: |
          # Path deps in argumentation/crates/... use ../../../encounter,
          # which resolves to the parent of this repo's root. Move the
          # sibling checkout there.
          mv encounter-sibling ../encounter
          ls -la ../encounter

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Build rustdoc
        run: cargo doc --workspace --no-deps

      - name: Install npm deps
        working-directory: website
        run: npm ci

      - name: Build Docusaurus
        working-directory: website
        run: npm run build

      - name: Combine outputs
        run: |
          mkdir -p public
          cp -r website/build/* public/
          mkdir -p public/api
          cp -r target/doc/* public/api/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
